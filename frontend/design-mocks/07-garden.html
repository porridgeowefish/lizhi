<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>荔知 - 荔园花园</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=LXGW+WenKai+TC&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f7ed; --fg: #2d3a29; --primary: #5a8f5c; --accent: #e8743f;
  --card: #ffffff; --muted: #6b7a66; --border: #c8dcc3;
  --tag-activity: #d4edda; --tag-activity-fg: #2d6a3e;
  --tag-lecture: #d6eaf8; --tag-lecture-fg: #1a5276;
  --tag-volunteer: #fdebd0; --tag-volunteer-fg: #b9770e;
  --tag-exam: #fadbd8; --tag-exam-fg: #922b21;
  --tag-recruitment: #d1f2eb; --tag-recruitment-fg: #0e6655;
  --tag-scholarship: #e8daef; --tag-scholarship-fg: #6c3483;
  --tag-other: #eaecee; --tag-other-fg: #5d6d7e;
  --title-font: 'ZCOOL XiaoWei', serif;
  --body-font: 'LXGW WenKai TC', -apple-system, 'PingFang SC', sans-serif;
  --tag-font: 'Nunito', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{background:var(--bg);color:var(--fg);font-family:var(--body-font);line-height:1.6;min-height:100vh;overflow-x:hidden;position:relative}

/* === Organic Background Layers === */
.garden-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.garden-canvas svg{width:100%;height:100%}
.leaf-float{position:fixed;pointer-events:none;z-index:0;opacity:0.18}
.leaf-float span{display:block;border-radius:50% 0 50% 50%;background:linear-gradient(135deg,var(--primary),#8bc34a);animation:leafDrift 20s ease-in-out infinite}
@keyframes leafDrift{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-18px) rotate(8deg)}50%{transform:translateY(6px) rotate(-5deg)}75%{transform:translateY(-10px) rotate(3deg)}}

body::before{content:'';position:fixed;top:-120px;left:-80px;width:400px;height:400px;background:radial-gradient(ellipse,rgba(90,143,92,0.18) 0%,transparent 70%);border-radius:50%;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-140px;right:-100px;width:450px;height:450px;background:radial-gradient(ellipse,rgba(232,116,63,0.12) 0%,transparent 70%);border-radius:50%;pointer-events:none;z-index:0}

/* === Header with Organic Wave === */
header{background:linear-gradient(160deg,#3d7a3f 0%,#5a8f5c 35%,#72a874 65%,#8bb890 100%);color:#fff;position:relative;z-index:100;padding-bottom:32px;box-shadow:0 6px 30px rgba(45,58,41,0.18)}
header::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:40px;background:var(--bg);border-radius:50% 50% 0 0/100% 100% 0 0}
.header-inner{max-width:960px;margin:0 auto;padding:22px 24px 0;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:14px;cursor:pointer;flex-shrink:0}
.brand-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--accent),#f09060);color:#fff;font-family:var(--title-font);font-size:28px;display:flex;align-items:center;justify-content:center;border-radius:18px;box-shadow:0 4px 16px rgba(232,116,63,0.35);position:relative;overflow:hidden}
.brand-icon::before{content:'';position:absolute;top:-8px;left:40%;width:22px;height:14px;background:#4a7f4c;border-radius:50% 50% 0 0;transform:rotate(-20deg)}
.brand-icon::after{content:'';position:absolute;top:-5px;left:55%;width:16px;height:10px;background:#5a8f5c;border-radius:50% 50% 0 0;transform:rotate(15deg)}
.brand h1{font-family:var(--title-font);font-size:26px;letter-spacing:4px;text-shadow:0 2px 8px rgba(0,0,0,0.15)}
.brand .tagline{font-size:12px;opacity:0.8;letter-spacing:1.5px;margin-top:2px}

/* === Sun-dappled Search === */
.search-box{flex:1;max-width:400px;display:flex;align-items:center;background:rgba(255,255,255,0.2);border-radius:100px;padding:10px 20px;gap:10px;transition:all 0.35s;backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,0.15)}
.search-box:focus-within{background:rgba(255,255,255,0.32);box-shadow:0 0 0 4px rgba(255,255,255,0.1),0 0 20px rgba(232,116,63,0.15)}
.search-box svg{flex-shrink:0;opacity:0.8}
.search-box input{flex:1;background:none;border:none;color:#fff;font-size:14px;font-family:var(--body-font);outline:none}
.search-box input::placeholder{color:rgba(255,255,255,0.55)}
.clear-btn{background:none;border:none;color:rgba(255,255,255,0.6);font-size:20px;cursor:pointer;padding:0 4px;line-height:1;display:none}
.clear-btn:hover{color:#fff}

/* === Category Nav === */
nav{background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:90;box-shadow:0 2px 12px rgba(45,58,41,0.06)}
.cat-inner{max-width:960px;margin:0 auto;padding:12px 24px;display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.cat-inner::-webkit-scrollbar{display:none}
.cat-btn{display:inline-flex;align-items:center;padding:7px 20px;border:1.5px solid var(--border);border-radius:100px;background:transparent;color:var(--muted);font-family:var(--tag-font);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all 0.3s}
.cat-btn:hover{border-color:var(--primary);color:var(--primary);background:rgba(90,143,92,0.06);transform:translateY(-1px)}
.cat-btn.active{background:var(--primary);border-color:var(--primary);color:#fff;box-shadow:0 3px 10px rgba(90,143,92,0.25)}

/* === Main Content === */
main{max-width:960px;margin:0 auto;padding:28px 24px 40px;position:relative;z-index:1}
.list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}
.list-title{font-family:var(--title-font);font-size:24px;color:var(--primary);position:relative}
.list-title::after{content:'';display:block;width:40px;height:3px;background:linear-gradient(90deg,var(--accent),transparent);border-radius:2px;margin-top:6px}
.list-count{font-size:14px;color:var(--muted);font-family:var(--tag-font);margin-left:10px}

/* === Masonry-ish Grid === */
.article-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:24px;align-items:start}

/* === Article Card === */
.article-card{background:var(--card);border-radius:20px;box-shadow:0 2px 14px rgba(45,58,41,0.06);cursor:pointer;transition:transform 0.35s ease,box-shadow 0.35s ease;position:relative;animation:growIn 0.5s ease both;overflow:visible}
.article-card:nth-child(odd){margin-top:0}
.article-card:nth-child(even){margin-top:18px}
/* CSS leaf decorations at card corners */
.article-card::before{content:'';position:absolute;top:-6px;right:-4px;width:36px;height:20px;background:linear-gradient(135deg,rgba(90,143,92,0.3),rgba(139,195,74,0.1));border-radius:0 50% 0 50%;transform:rotate(30deg);z-index:2;transition:transform 0.3s,opacity 0.3s}
.article-card:nth-child(even)::before{top:auto;right:auto;bottom:-6px;left:-4px;transform:rotate(-150deg)}
.article-card::after{content:'';position:absolute;top:-3px;right:24px;width:18px;height:12px;background:linear-gradient(135deg,rgba(139,195,74,0.2),transparent);border-radius:50% 50% 0 50%;transform:rotate(45deg);z-index:2;transition:transform 0.3s}
.article-card:hover{transform:scale(1.02) translateY(-4px);box-shadow:0 12px 36px rgba(45,58,41,0.13),0 4px 12px rgba(90,143,92,0.08)}
.article-card:hover::before{transform:rotate(40deg) scale(1.15);opacity:0.9}
.article-card:hover::after{transform:rotate(55deg) scale(1.1)}
/* Leaf shadow beneath card on hover */
.article-card .leaf-shadow{position:absolute;bottom:-12px;left:12%;right:12%;height:24px;background:radial-gradient(ellipse,rgba(90,143,92,0.14) 0%,transparent 80%);border-radius:50%;opacity:0;transition:opacity 0.35s;pointer-events:none}
.article-card:hover .leaf-shadow{opacity:1}
@keyframes growIn{from{opacity:0;transform:scale(0.94) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}

.card-inner{padding:22px 22px 18px;position:relative;z-index:3}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.card-source{font-size:12px;color:var(--accent);font-weight:700;font-family:var(--tag-font);letter-spacing:0.5px}
.card-date{font-size:12px;color:var(--muted);font-family:var(--tag-font)}
.card-title{font-family:var(--title-font);font-size:17px;line-height:1.55;color:var(--fg);margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;transition:color 0.2s}
.article-card:hover .card-title{color:var(--primary)}
.card-desc{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-bottom{display:flex;justify-content:space-between;align-items:center}
.card-tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-family:var(--tag-font);font-size:11px;font-weight:700;padding:3px 12px;border-radius:100px;transition:transform 0.2s}
.tag:hover{transform:scale(1.06)}
.tag-activity{background:var(--tag-activity);color:var(--tag-activity-fg)}
.tag-lecture{background:var(--tag-lecture);color:var(--tag-lecture-fg)}
.tag-volunteer{background:var(--tag-volunteer);color:var(--tag-volunteer-fg)}
.tag-exam{background:var(--tag-exam);color:var(--tag-exam-fg)}
.tag-recruitment{background:var(--tag-recruitment);color:var(--tag-recruitment-fg)}
.tag-scholarship{background:var(--tag-scholarship);color:var(--tag-scholarship-fg)}
.tag-other{background:var(--tag-other);color:var(--tag-other-fg)}
.bookmark-btn{background:none;border:none;cursor:pointer;color:var(--border);font-size:20px;transition:all 0.3s;padding:4px;line-height:1}
.bookmark-btn:hover,.bookmark-btn.active{color:var(--accent);transform:scale(1.2)}
.bookmark-btn.active{text-shadow:0 0 8px rgba(232,116,63,0.3)}
.card-link{display:inline-block;margin-top:14px;font-size:13px;color:var(--primary);text-decoration:none;font-family:var(--tag-font);font-weight:700;transition:all 0.25s;position:relative;padding-bottom:1px}
.card-link::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1.5px;background:var(--accent);transition:width 0.3s;border-radius:1px}
.card-link:hover{color:var(--accent)}
.card-link:hover::after{width:100%}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:0.7}

/* === Footer === */
footer{text-align:center;padding:32px 24px;color:var(--muted);font-size:12px;border-top:1px solid var(--border);margin-top:48px;position:relative;z-index:1}
footer::before{content:'';display:block;width:60px;height:3px;background:linear-gradient(90deg,transparent,var(--primary),transparent);border-radius:2px;margin:0 auto 16px}

/* === Floating Leaf Particles === */
.particle{position:fixed;pointer-events:none;z-index:0;opacity:0}
.particle span{display:block;border-radius:50% 0 50% 50%;animation:particleFall linear infinite}
@keyframes particleFall{0%{transform:translateY(-20px) rotate(0deg);opacity:0}10%{opacity:0.15}90%{opacity:0.15}100%{transform:translateY(calc(100vh + 20px)) rotate(360deg);opacity:0}}

/* === Responsive === */
@media(max-width:960px){
  .article-grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
}
@media(max-width:640px){
  .header-inner{flex-direction:column;gap:14px;padding:16px 16px 0;text-align:center}
  .brand{justify-content:center}
  .search-box{max-width:100%}
  nav{top:0}
  .cat-inner{padding:8px 12px}
  main{padding:20px 16px}
  .article-grid{grid-template-columns:1fr}
  .article-card:nth-child(even){margin-top:0}
  .list-title{font-size:20px}
  .brand h1{font-size:22px}
}
</style>
</head>
<body>
<!-- Organic Background -->
<div class="garden-canvas">
<svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow1" cx="15%" cy="20%" r="25%"><stop offset="0%" stop-color="#5a8f5c" stop-opacity="0.1"/><stop offset="100%" stop-color="#5a8f5c" stop-opacity="0"/></radialGradient>
    <radialGradient id="glow2" cx="85%" cy="75%" r="30%"><stop offset="0%" stop-color="#e8743f" stop-opacity="0.07"/><stop offset="100%" stop-color="#e8743f" stop-opacity="0"/></radialGradient>
    <radialGradient id="glow3" cx="50%" cy="10%" r="20%"><stop offset="0%" stop-color="#8bc34a" stop-opacity="0.06"/><stop offset="100%" stop-color="#8bc34a" stop-opacity="0"/></radialGradient>
  </defs>
  <rect fill="url(#glow1)" width="1440" height="900"/>
  <rect fill="url(#glow2)" width="1440" height="900"/>
  <rect fill="url(#glow3)" width="1440" height="900"/>
  <g opacity="0.04">
    <ellipse cx="200" cy="150" rx="120" ry="40" fill="#5a8f5c" transform="rotate(-15 200 150)"/>
    <ellipse cx="1200" cy="100" rx="80" ry="30" fill="#5a8f5c" transform="rotate(20 1200 100)"/>
    <ellipse cx="1300" cy="700" rx="100" ry="35" fill="#5a8f5c" transform="rotate(-10 1300 700)"/>
    <ellipse cx="150" cy="650" rx="90" ry="32" fill="#8bc34a" transform="rotate(25 150 650)"/>
  </g>
</svg>
</div>

<!-- Floating Leaf Particles -->
<div class="particle" style="left:8%;animation:particleFall 18s linear 0s infinite"><span style="width:14px;height:22px;background:linear-gradient(135deg,#5a8f5c,#8bc34a)"></span></div>
<div class="particle" style="left:25%;animation:particleFall 22s linear 4s infinite"><span style="width:10px;height:16px;background:linear-gradient(135deg,#8bc34a,#aed581)"></span></div>
<div class="particle" style="left:55%;animation:particleFall 20s linear 8s infinite"><span style="width:12px;height:20px;background:linear-gradient(135deg,#5a8f5c,#81c784)"></span></div>
<div class="particle" style="left:78%;animation:particleFall 24s linear 2s infinite"><span style="width:16px;height:26px;background:linear-gradient(135deg,#7cb342,#c5e1a5)"></span></div>
<div class="particle" style="left:92%;animation:particleFall 19s linear 12s infinite"><span style="width:11px;height:18px;background:linear-gradient(135deg,#5a8f5c,#a5d6a7)"></span></div>

<!-- Floating Decorative Leaves -->
<div class="leaf-float" style="top:18%;left:4%"><span style="width:20px;height:34px;animation-delay:0s"></span></div>
<div class="leaf-float" style="top:35%;right:5%"><span style="width:16px;height:28px;animation-delay:5s"></span></div>
<div class="leaf-float" style="top:60%;left:2%"><span style="width:18px;height:30px;animation-delay:10s"></span></div>
<div class="leaf-float" style="top:80%;right:3%"><span style="width:14px;height:24px;animation-delay:15s"></span></div>

<header>
  <div class="header-inner">
    <div class="brand" onclick="resetView()">
      <div class="brand-icon">荔</div>
      <div>
        <h1>荔知</h1>
        <p class="tagline">荔园花园 · 深大信息聚合</p>
      </div>
    </div>
    <div class="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="searchInput" placeholder="搜索讲座、活动、志愿..." onkeydown="if(event.key==='Enter')doSearch()">
      <button id="clearBtn" class="clear-btn" onclick="clearSearch()">&times;</button>
    </div>
  </div>
</header>

<nav>
  <div class="cat-inner" id="catBar"></div>
</nav>

<main>
  <div class="list-header">
    <h2 class="list-title" id="listTitle">全部信息<span class="list-count" id="listCount"></span></h2>
  </div>
  <div class="article-grid" id="articleGrid"></div>
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="empty-icon">&#127811;</div>
    <p>暂无相关信息</p>
    <p style="font-size:13px;margin-top:6px;color:var(--muted)">试试其他分类或搜索关键词</p>
  </div>
</main>

<footer>荔知 · 荔园花园 · 深圳大学校园信息聚合平台</footer>

<script>
const ARTICLES=[
  {id:1,mp_name:"深圳大学学生会",title:"2026年深圳大学校园文化节志愿者招募公告",description:"为丰富校园文化生活，现面向全校招募文化节志愿者，包括活动策划、现场执行、宣传推广等岗位，欢迎热爱校园生活的同学积极报名。",url:"#",categories:"volunteer,activity",publish_time:"2026-05-20"},
  {id:2,mp_name:"深大就业指导中心",title:"华为2026春季校园招聘宣讲会（深圳大学站）",description:"华为技术有限公司将于5月28日在科技楼一号报告厅举办校园招聘宣讲会，面向全校本科及研究生，涵盖技术研发、产品、设计等多个岗位方向。",url:"#",categories:"recruitment",publish_time:"2026-05-19"},
  {id:3,mp_name:"计算机与软件学院",title:"学术讲座：大语言模型的前沿研究与应用",description:"本次讲座邀请清华大学计算机系张教授分享大语言模型最新研究进展，涵盖模型架构、训练方法及应用场景等多个方面。",url:"#",categories:"lecture",publish_time:"2026-05-18"},
  {id:4,mp_name:"深大教务部",title:"关于2026年大学英语四六级考试报名的通知",description:"2026年上半年大学英语四、六级考试报名工作即将开始，请各位同学在规定时间内完成报名，逾期不再补报。",url:"#",categories:"exam",publish_time:"2026-05-17"},
  {id:5,mp_name:"深圳大学团委",title:"第十五届挑战杯全国大学生课外学术科技作品竞赛校内选拔",description:"为选拔优秀作品参加全国挑战杯竞赛，现开展校内选拔工作，欢迎各学院积极组织学生参赛，展示创新成果。",url:"#",categories:"activity",publish_time:"2026-05-16"},
  {id:6,mp_name:"学生资助管理中心",title:"2025-2026学年度国家奖学金评选工作通知",description:"根据教育部有关文件精神，现启动2025-2026学年度国家奖学金评选工作，请符合条件的同学按要求提交申请材料。",url:"#",categories:"scholarship",publish_time:"2026-05-15"},
  {id:7,mp_name:"深圳大学图书馆",title:"数据库使用培训讲座：Web of Science 高效检索技巧",description:"图书馆将于下周三举办Web of Science数据库使用培训，帮助同学掌握高效文献检索方法，提升学术研究能力。",url:"#",categories:"lecture,other",publish_time:"2026-05-14"},
  {id:8,mp_name:"建筑与城市规划学院",title:"2026深大建筑节：城市记忆与未来想象——学生设计作品展",description:"本届建筑节将展出学院本科及研究生优秀设计作品，同时邀请业界专家进行评审与对谈，欢迎全校师生参观交流。",url:"#",categories:"activity",publish_time:"2026-05-13"}
];
const CATEGORIES=[
  {key:'',label:'全部'},{key:'activity',label:'活动'},{key:'lecture',label:'讲座'},
  {key:'volunteer',label:'志愿'},{key:'exam',label:'考试'},{key:'recruitment',label:'招聘'},
  {key:'scholarship',label:'奖助'},{key:'other',label:'其他'}
];
const bookmarks=new Set();
let currentCat='',searchQuery='';

function relativeTime(dt){
  const d=new Date(dt),now=new Date('2026-05-21'),diff=Math.floor((now-d)/86400000);
  if(diff===0)return'今天';if(diff===1)return'昨天';return diff+'天前';
}
function getFiltered(){
  let list=ARTICLES;
  if(currentCat)list=list.filter(a=>a.categories.split(',').includes(currentCat));
  if(searchQuery){const q=searchQuery.toLowerCase();list=list.filter(a=>a.title.toLowerCase().includes(q)||a.description.toLowerCase().includes(q))}
  return list;
}
function renderCats(){
  document.getElementById('catBar').innerHTML=CATEGORIES.map(c=>
    `<button class="cat-btn${currentCat===c.key?' active':''}" onclick="switchCat('${c.key}')">${c.label}</button>`
  ).join('');
}
function renderArticles(){
  const list=getFiltered(),grid=document.getElementById('articleGrid'),empty=document.getElementById('emptyState');
  const catLabel=CATEGORIES.find(c=>c.key===currentCat)?.label||'全部';
  document.getElementById('listTitle').innerHTML=(searchQuery?`搜索"${searchQuery}"的结果`:catLabel+'信息')+(list.length?`<span class="list-count">${list.length} 条</span>`:'');
  if(!list.length){grid.innerHTML='';empty.style.display='block';return}
  empty.style.display='none';
  grid.innerHTML=list.map((a,i)=>{
    const tags=a.categories.split(',').map(c=>`<span class="tag tag-${c}">${CATEGORIES.find(x=>x.key===c)?.label||c}</span>`).join('');
    return`<div class="article-card" style="animation-delay:${i*70}ms" onclick="location.href='${a.url}'">
      <div class="card-inner">
        <div class="card-top">
          <span class="card-source">${a.mp_name}</span>
          <span class="card-date">${relativeTime(a.publish_time)}</span>
        </div>
        <h3 class="card-title">${a.title}</h3>
        <p class="card-desc">${a.description}</p>
        <div class="card-bottom">
          <div class="card-tags">${tags}</div>
          <button class="bookmark-btn${bookmarks.has(a.id)?' active':''}" onclick="event.stopPropagation();toggleBookmark(${a.id},this)" title="收藏">&#9733;</button>
        </div>
        <a class="card-link" href="${a.url}" onclick="event.stopPropagation()">查看原文 &#8594;</a>
      </div>
      <div class="leaf-shadow"></div>
    </div>`;
  }).join('');
}
function switchCat(key){currentCat=key;searchQuery='';document.getElementById('searchInput').value='';document.getElementById('clearBtn').style.display='none';renderCats();renderArticles()}
function doSearch(){const v=document.getElementById('searchInput').value.trim();if(!v)return;searchQuery=v;currentCat='';document.getElementById('clearBtn').style.display='block';renderCats();renderArticles()}
function clearSearch(){searchQuery='';document.getElementById('searchInput').value='';document.getElementById('clearBtn').style.display='none';renderArticles()}
function resetView(){currentCat='';searchQuery='';document.getElementById('searchInput').value='';document.getElementById('clearBtn').style.display='none';renderCats();renderArticles()}
function toggleBookmark(id,btn){if(bookmarks.has(id)){bookmarks.delete(id);btn.classList.remove('active')}else{bookmarks.add(id);btn.classList.add('active')}}
document.getElementById('searchInput').addEventListener('input',function(){document.getElementById('clearBtn').style.display=this.value?'block':'none'});
renderCats();renderArticles();
</script>
</body>
</html>
